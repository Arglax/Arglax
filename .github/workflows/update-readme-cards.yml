name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:   

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Arglax&show_icons=true&theme=react&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Arglax&layout=compact&theme=react&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - Farcave
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=Arglax&repo=Farcave&theme=react&hide_border=true
          path: profile/pin-farcave.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - solar-dashboard
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=Arglax&repo=solar-dashboard&theme=react&hide_border=true
          path: profile/pin-solar-dashboard.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - Mobile-WuWa-Config
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=Arglax&repo=Mobile-WuWa-Config&theme=react&hide_border=true
          path: profile/pin-mobile-wuwa-config.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "chore: update stats cards" || exit 0
          git push
